<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Proíbe o navegador de adaptar cores nativas ao tema do SO -->
    <meta name="color-scheme" content="light only" />
    <meta name="theme-color" content="#ffffff" />
    <!-- Padrão LIGHT — ignorar configuração do SO. Atualizado via JS quando o usuário escolhe dark. -->
    <meta id="meta-color-scheme" name="color-scheme" content="light" />
    <script>
      (function () {
        try {
          /* Limpa chaves de dark mode antigas e força sempre light mode */
          localStorage.removeItem('jagendamento-theme');
          localStorage.removeItem('jagendamento-ui-theme');
          localStorage.removeItem('jagendamento-ui-theme-v2');
          localStorage.removeItem('jagendamento-ui-theme-v3');
        } catch (e) { /* ignorar */ }
        document.documentElement.classList.remove('dark');
        document.documentElement.style.colorScheme = 'light';
      })();
    </script>
    <title>Sistema Multi-Prefeituras - Agendamento Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link href="/src/main.css" rel="stylesheet" />
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- VLibras Widget -->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
</body>

</html>
